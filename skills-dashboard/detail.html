<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skill 详情</title>
    <style>
      :root {
        --bg: #ffffff;
        --bg-hover: #f3f4f6;
        --border: #e5e7eb;
        --text: #111827;
        --text-secondary: #6b7280;
        --text-tertiary: #9ca3af;
        --accent: #000000;
        --accent-hover: #374151;
        --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        --radius: 8px;
        --radius-lg: 12px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background-color: var(--bg);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button {
        font: inherit;
        border: none;
        outline: none;
        background: none;
        cursor: pointer;
      }

      .app {
        max-width: 1800px;
        width: 100%;
        margin: 0 auto;
        padding: 40px 4vw;
      }

      .nav-bar {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 32px;
      }

      .back-btn {
        display: inline-flex;
        align-items: center;
        padding: 8px 12px;
        border-radius: var(--radius);
        color: var(--text-secondary);
        font-size: 14px;
        transition: background 0.2s;
        margin-left: -12px;
      }

      .back-btn:hover {
        background: var(--bg-hover);
        color: var(--text);
      }

      .back-btn svg {
        margin-right: 6px;
      }

      .header {
        margin-bottom: 40px;
      }

      .title-row {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
        flex-wrap: wrap;
      }

      h1 {
        margin: 0 0 12px 0;
        font-size: 24px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }

      .sub {
        color: var(--text-secondary);
        font-size: 15px;
        line-height: 1.6;
        margin: 0;
      }

      .download-btn {
        display: inline-flex;
        align-items: center;
        padding: 8px 16px;
        background: var(--accent);
        color: #fff;
        border-radius: var(--radius);
        font-size: 14px;
        font-weight: 500;
        transition: background 0.2s;
      }

      .download-btn:hover {
        background: var(--accent-hover);
      }

      .download-btn svg {
        margin-right: 8px;
      }

      .section {
        margin-bottom: 40px;
      }

      h2 {
        font-size: 16px;
        font-weight: 600;
        margin: 0 0 16px 0;
        color: var(--text);
        border-bottom: 1px solid var(--border);
        padding-bottom: 8px;
      }

      .grid-layout {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 24px;
      }

      .info-group {
        margin-bottom: 16px;
      }

      .info-label {
        font-size: 13px;
        color: var(--text-secondary);
        margin-bottom: 8px;
      }

      .tag-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .tag {
        font-size: 13px;
        padding: 4px 10px;
        background: var(--bg-hover);
        color: var(--text);
        border-radius: 4px;
        border: 1px solid var(--border);
      }

      .tag.highlight {
        background: #fff;
        border-color: var(--text-secondary);
      }

      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }

      .tabs {
        display: flex;
        border-bottom: 1px solid var(--border);
        margin-bottom: 16px;
        overflow-x: auto;
      }

      .tab-btn {
        padding: 10px 16px;
        font-size: 14px;
        font-weight: 500;
        color: var(--text-secondary);
        border-bottom: 2px solid transparent;
        transition: all 0.2s;
        white-space: nowrap;
      }

      .tab-btn:hover {
        color: var(--text);
      }

      .tab-btn.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
      }

      .tab-content {
        display: none;
      }

      .tab-content.active {
        display: block;
      }

      .tab-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }

      .tab-download-btn {
        display: inline-flex;
        align-items: center;
        padding: 6px 12px;
        background: #fff;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        font-size: 12px;
        color: var(--text-secondary);
        transition: all 0.2s;
      }

      .tab-download-btn:hover {
        background: var(--bg-hover);
        color: var(--text);
      }

      .tab-download-btn svg {
        margin-right: 6px;
      }

      .doc-pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 13px;
        line-height: 1.6;
        color: var(--text-secondary);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        background: var(--bg-hover);
        padding: 16px;
        border-radius: var(--radius);
        max-height: 500px;
        overflow-y: auto;
      }

      .markdown-body {
        font-size: 14px;
        line-height: 1.6;
        color: var(--text);
        background: #fff;
        padding: 16px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        max-height: 500px;
        overflow-y: auto;
      }
      .markdown-body h1, .markdown-body h2, .markdown-body h3 {
        margin-top: 24px;
        margin-bottom: 16px;
        font-weight: 600;
        line-height: 1.25;
      }
      .markdown-body h1 { font-size: 2em; border-bottom: 1px solid var(--border); padding-bottom: .3em; }
      .markdown-body h2 { font-size: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: .3em; }
      .markdown-body h3 { font-size: 1.25em; }
      .markdown-body p { margin-top: 0; margin-bottom: 16px; }
      .markdown-body a { color: #0969da; text-decoration: none; }
      .markdown-body ul, .markdown-body ol { padding-left: 2em; margin-bottom: 16px; }
      .markdown-body li { margin-top: 0.25em; }
      .markdown-body code {
        padding: .2em .4em;
        margin: 0;
        font-size: 85%;
        background-color: var(--bg-hover);
        border-radius: 6px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }
      .markdown-body pre {
        padding: 16px;
        overflow: auto;
        font-size: 85%;
        line-height: 1.45;
        background-color: var(--bg-hover);
        border-radius: 6px;
        margin-bottom: 16px;
      }
      .markdown-body pre code { background-color: transparent; padding: 0; }

      .constraints-list {
        margin: 0;
        padding-left: 20px;
        color: var(--text-secondary);
        font-size: 14px;
        line-height: 1.7;
      }

      .constraints-list li {
        margin-bottom: 8px;
      }

      .loading, .error {
        text-align: center;
        padding: 64px 20px;
        color: var(--text-secondary);
        background: var(--bg-hover);
        border-radius: var(--radius-lg);
      }

    </style>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>
  <body>
    <main class="app" id="app">
      <div class="loading">正在加载...</div>
    </main>

    <script>
      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      async function fetchJson(path) {
        const response = await fetch(path);
        if (!response.ok) throw new Error(`读取失败: ${path}`);
        return response.json();
      }

      async function fetchText(path) {
        const response = await fetch(path);
        if (!response.ok) throw new Error(`读取失败: ${path}`);
        return response.text();
      }

      function buildDocLink(skill, relativePath) {
        return `../${skill.package_root}/${relativePath}`;
      }

      async function downloadZip(skill) {
        const button = document.getElementById("downloadZipButton");
        const detail = skill.detail || {};
        const distribution = detail.distribution || {};
        const packageFiles = distribution.package_files || distribution.required_files || [];

        if (!packageFiles.length) {
          window.alert("当前 skill 没有可打包的文件清单。");
          return;
        }

        if (!window.JSZip) {
          window.alert("ZIP 依赖加载失败。");
          return;
        }

        const originalLabel = button.innerHTML;
        button.innerHTML = "正在打包...";
        button.style.pointerEvents = "none";
        button.style.opacity = "0.6";

        try {
          const zip = new window.JSZip();

          await Promise.all(
            packageFiles.map(async (relativePath) => {
              const response = await fetch(buildDocLink(skill, relativePath));
              if (!response.ok) throw new Error(`读取失败：${relativePath}`);
              const content = await response.blob();
              zip.file(`${skill.name}/${relativePath}`, content);
            })
          );

          const blob = await zip.generateAsync({ type: "blob" });
          const url = URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.href = url;
          link.download = `${skill.name}.zip`;
          document.body.appendChild(link);
          link.click();
          link.remove();
          URL.revokeObjectURL(url);
        } catch (error) {
          window.alert(error.message || "ZIP 打包失败");
        } finally {
          button.innerHTML = originalLabel;
          button.style.pointerEvents = "";
          button.style.opacity = "";
        }
      }

      async function loadDetail() {
        const params = new URLSearchParams(window.location.search);
        const skillName = params.get("skill");
        if (!skillName) throw new Error("缺少 skill 参数");

        const registry = await fetchJson("../registry/skills-index.json");
        const skill = registry.skills.find((item) => item.name === skillName);
        if (!skill) throw new Error(`未找到 skill: ${skillName}`);

        const detail = await fetchJson(`../${skill.package_root}/skill.json`);
        return { ...skill, detail };
      }

      function render(skill) {
        const app = document.getElementById("app");
        const detail = skill.detail || {};
        const implementation = detail.implementation || {};
        const requiredInputs = detail.inputs?.required || [];
        const optionalInputs = detail.inputs?.optional || [];
        const outputs = detail.outputs || [];
        const constraints = detail.constraints || [];

        const links = [
          ["SKILL.md", buildDocLink(skill, detail.entrypoint || "SKILL.md")],
          ["README.md", buildDocLink(skill, implementation.readme || "README.md")],
          ["skill.json", buildDocLink(skill, "skill.json")],
          ["INVOCATION.md", implementation.invocation_doc ? buildDocLink(skill, implementation.invocation_doc) : null]
        ].filter((item) => item[1]);

        app.innerHTML = `
          <div class="nav-bar">
            <a href="./index.html" class="back-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
              返回列表
            </a>
          </div>

          <header class="header">
            <div class="title-row">
              <div>
                <h1>${escapeHtml(skill.display_name || skill.name)}</h1>
                <p class="sub">${escapeHtml(detail.description || "暂无描述")}</p>
              </div>
              <button class="download-btn" id="downloadZipButton" type="button">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                下载 ZIP
              </button>
            </div>
          </header>

          <section class="section">
            <h2>文档资源</h2>
            <div class="tabs" id="docTabs">
              ${links.map(([label, href], index) => `
                <button class="tab-btn ${index === 0 ? 'active' : ''}" data-tab-id="tab-${index}">
                  ${escapeHtml(label)}
                </button>
              `).join("")}
            </div>
            <div class="tab-contents" id="docContents">
              ${links.map(([label, href], index) => `
                <div class="tab-content ${index === 0 ? 'active' : ''}" id="tab-${index}">
                  <div class="tab-header">
                    <span class="info-label mono" style="margin:0;">${escapeHtml(href.replace('../', ''))}</span>
                    <div style="display: flex; gap: 8px;">
                      <button class="tab-download-btn copy-btn" data-copy-target="doc-content-${index}">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        <span>复制</span>
                      </button>
                      <a class="tab-download-btn" href="${escapeHtml(href)}" download="${escapeHtml(label)}">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        下载此文件
                      </a>
                    </div>
                  </div>
                  <pre class="doc-pre" id="doc-content-${index}" data-load-path="${escapeHtml(href)}">加载中...</pre>
                </div>
              `).join("")}
            </div>
          </section>

          <div class="grid-layout">
            <section class="section">
              <h2>基础信息</h2>
              <div class="info-group">
                <div class="info-label">类型</div>
                <div class="tag-list">
                  <span class="tag highlight">${escapeHtml(detail.type || skill.type || "skill")}</span>
                  <span class="tag">${detail.portable === false ? "非便携" : "整包可分发"}</span>
                </div>
              </div>
              <div class="info-group">
                <div class="info-label">包路径</div>
                <div class="tag-list">
                  <span class="tag mono">${escapeHtml(skill.package_root)}</span>
                </div>
              </div>
              <div class="info-group">
                <div class="info-label">业务分类</div>
                <div class="tag-list">
                  ${(skill.category_path || []).map((item) => `<span class="tag">${escapeHtml(item)}</span>`).join("")}
                </div>
              </div>
            </section>

            <section class="section">
              <h2>输入 / 输出</h2>
              <div class="tag-list">
                ${requiredInputs.map((item) => `<span class="tag highlight">必填：${escapeHtml(item)}</span>`).join("")}
                ${optionalInputs.map((item) => `<span class="tag">可选：${escapeHtml(item)}</span>`).join("")}
                ${outputs.map((item) => `<span class="tag mono">输出：${escapeHtml(item)}</span>`).join("")}
              </div>
            </section>
          </div>

          <section class="section">
            <h2>规则约束</h2>
            ${constraints.length
              ? `<ul class="constraints-list">${constraints.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>`
              : `<div class="info-label">暂无规则约束</div>`
            }
          </section>

          <footer style="margin-top: 60px; padding-top: 24px; border-top: 1px solid var(--border); color: var(--text-tertiary); font-size: 13px; text-align: center;">
            SkillForge 默认支持多平台 AI 复用：Claude, Codex, GPT, Manus, Trae, Qorder
          </footer>
        `;

        document.getElementById("downloadZipButton").addEventListener("click", () => downloadZip(skill));

        // Tab Logic
        const tabBtns = document.querySelectorAll(".tab-btn");
        const tabContents = document.querySelectorAll(".tab-content");
        
        tabBtns.forEach(btn => {
          btn.addEventListener("click", () => {
            tabBtns.forEach(b => b.classList.remove("active"));
            tabContents.forEach(c => c.classList.remove("active"));
            
            btn.classList.add("active");
            document.getElementById(btn.dataset.tabId).classList.add("active");
          });
        });

        // Load document contents
        document.querySelectorAll(".doc-pre").forEach(async (pre) => {
          try {
            const path = pre.dataset.loadPath;
            let content = await fetchText(path);
            if (path.endsWith(".json")) {
              content = JSON.stringify(JSON.parse(content), null, 2);
              pre.textContent = content;
            } else if (path.endsWith(".md")) {
              const div = document.createElement("div");
              div.className = "markdown-body";
              div.innerHTML = marked.parse(content);
              div.id = pre.id;
              div.dataset.rawContent = content;
              pre.replaceWith(div);
            } else {
              pre.textContent = content;
              pre.dataset.rawContent = content;
            }
          } catch (err) {
            pre.textContent = "文档读取失败: " + err.message;
          }
        });

        // Copy Logic
        document.querySelectorAll(".copy-btn").forEach(btn => {
          btn.addEventListener("click", () => {
            const targetId = btn.dataset.copyTarget;
            const targetEl = document.getElementById(targetId);
            let textToCopy = "";
            if (targetEl) {
              textToCopy = targetEl.dataset.rawContent || targetEl.textContent;
            }
            if (textToCopy) {
              navigator.clipboard.writeText(textToCopy).then(() => {
                const span = btn.querySelector("span");
                const originalText = span.textContent;
                span.textContent = "已复制";
                setTimeout(() => { span.textContent = originalText; }, 2000);
              }).catch(err => {
                window.alert("复制失败: " + err.message);
              });
            }
          });
        });
      }

      loadDetail()
        .then(render)
        .catch((error) => {
          document.getElementById("app").innerHTML = `
            <div class="error">
              ${escapeHtml(error.message)}<br />
              请确认通过本地 HTTP 服务访问，并带上正确的 <span class="mono">?skill=</span> 参数。
            </div>
          `;
        });
    </script>
  </body>
</html>
