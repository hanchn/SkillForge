<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skill 详情</title>
    <style>
      :root {
        --panel: rgba(255, 255, 255, 0.78);
        --panel-strong: rgba(255, 255, 255, 0.92);
        --panel-border: rgba(15, 23, 42, 0.08);
        --text: #101828;
        --text-soft: #667085;
        --text-dim: #98a2b3;
        --accent: #335c81;
        --accent-soft: rgba(51, 92, 129, 0.12);
        --shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
        --radius-xl: 28px;
        --radius-lg: 22px;
        --radius-md: 16px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(51, 92, 129, 0.08), transparent 28%),
          radial-gradient(circle at top right, rgba(15, 23, 42, 0.06), transparent 26%),
          linear-gradient(180deg, #fafafb 0%, #eef1f4 100%);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.22) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.22) 1px, transparent 1px);
        background-size: 28px 28px;
        mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.4), transparent 72%);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .app {
        max-width: 1180px;
        margin: 0 auto;
        padding: 32px 24px 48px;
      }

      .panel,
      .section-card {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .panel {
        border-radius: var(--radius-xl);
        padding: 28px;
      }

      .section-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
        margin-top: 18px;
      }

      .section-card {
        border-radius: var(--radius-lg);
        padding: 20px;
      }

      .eyebrow,
      .tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        font-size: 12px;
      }

      .eyebrow {
        background: rgba(255, 255, 255, 0.76);
        color: var(--text-soft);
        letter-spacing: 0.06em;
      }

      .head-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        flex-wrap: wrap;
      }

      h1 {
        margin: 8px 0 0;
        font-size: 20px;
        line-height: 1.2;
        letter-spacing: -0.03em;
      }

      .sub {
        margin: 0;
        color: var(--text-soft);
        line-height: 1.8;
        font-size: 15px;
      }

      .top-actions,
      .tag-row,
      .detail-actions,
      .detail-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .top-actions {
        margin-top: 22px;
      }

      .action {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 14px;
        border-radius: 14px;
        background: var(--panel-strong);
        border: 1px solid rgba(15, 23, 42, 0.07);
        transition: transform 0.2s ease, border-color 0.2s ease;
      }

      .action:hover {
        transform: translateY(-1px);
        border-color: rgba(51, 92, 129, 0.2);
      }

      .tag {
        background: rgba(15, 23, 42, 0.05);
        color: var(--text-soft);
      }

      .tag.accent {
        background: var(--accent-soft);
        color: var(--accent);
      }

      h2 {
        margin: 0 0 12px;
        font-size: 16px;
      }

      .list {
        margin: 0;
        padding-left: 18px;
        color: var(--text-soft);
        line-height: 1.8;
      }

      .mono {
        font-family: "SFMono-Regular", "Consolas", "Menlo", monospace;
      }

      .hint,
      .loading,
      .error {
        color: var(--text-dim);
        font-size: 13px;
      }

      .loading,
      .error {
        padding: 28px;
        border-radius: var(--radius-lg);
        background: rgba(255, 255, 255, 0.82);
        border: 1px dashed rgba(15, 23, 42, 0.12);
      }

      .modal {
        position: fixed;
        inset: 0;
        z-index: 60;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: rgba(15, 23, 42, 0.24);
        backdrop-filter: blur(10px);
      }

      .modal[hidden] {
        display: none;
      }

      .modal-card {
        width: min(920px, 100%);
        max-height: min(82vh, 900px);
        overflow: hidden;
        background: rgba(255, 255, 255, 0.95);
        border: 1px solid rgba(15, 23, 42, 0.08);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow);
      }

      .modal-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 16px 18px;
        border-bottom: 1px solid rgba(15, 23, 42, 0.08);
      }

      .modal-body {
        padding: 18px;
        max-height: calc(82vh - 64px);
        overflow: auto;
      }

      .modal-pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        color: var(--text-soft);
        line-height: 1.7;
      }

      @media (max-width: 860px) {
        .section-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 760px) {
        .app {
          padding: 18px 14px 28px;
        }
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  </head>
  <body>
    <main class="app" id="app">
      <div class="loading">正在读取 skill 详情...</div>
    </main>

    <script>
      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      async function fetchJson(path) {
        const response = await fetch(path);
        if (!response.ok) {
          throw new Error(`读取失败: ${path}`);
        }
        return response.json();
      }

      async function fetchText(path) {
        const response = await fetch(path);
        if (!response.ok) {
          throw new Error(`读取失败: ${path}`);
        }
        return response.text();
      }

      function buildDocLink(skill, relativePath) {
        return `../${skill.package_root}/${relativePath}`;
      }

      async function previewFile(label, path) {
        const title = document.getElementById("viewerTitle");
        const content = document.getElementById("viewerContent");
        const modal = document.getElementById("viewerModal");

        try {
          let text = await fetchText(path);
          if (path.endsWith(".json")) {
            text = JSON.stringify(JSON.parse(text), null, 2);
          }
          title.textContent = label;
          content.textContent = text;
          modal.hidden = false;
        } catch (error) {
          title.textContent = "读取失败";
          content.textContent = error.message || "文档读取失败";
          modal.hidden = false;
        }
      }

      async function downloadZip(skill) {
        const button = document.getElementById("downloadZipButton");
        const detail = skill.detail || {};
        const distribution = detail.distribution || {};
        const packageFiles = distribution.package_files || distribution.required_files || [];

        if (!packageFiles.length) {
          window.alert("当前 skill 没有可打包的文件清单。");
          return;
        }

        if (!window.JSZip) {
          window.alert("ZIP 依赖加载失败。");
          return;
        }

        const originalLabel = button.textContent;
        button.textContent = "正在打包...";
        button.style.pointerEvents = "none";
        button.style.opacity = "0.6";

        try {
          const zip = new window.JSZip();

          await Promise.all(
            packageFiles.map(async (relativePath) => {
              const response = await fetch(buildDocLink(skill, relativePath));
              if (!response.ok) {
                throw new Error(`读取失败：${relativePath}`);
              }
              const content = await response.blob();
              zip.file(`${skill.name}/${relativePath}`, content);
            })
          );

          const blob = await zip.generateAsync({ type: "blob" });
          const url = URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.href = url;
          link.download = `${skill.name}.zip`;
          document.body.appendChild(link);
          link.click();
          link.remove();
          URL.revokeObjectURL(url);
        } catch (error) {
          window.alert(error.message || "ZIP 打包失败");
        } finally {
          button.textContent = originalLabel;
          button.style.pointerEvents = "";
          button.style.opacity = "";
        }
      }

      async function loadDetail() {
        const params = new URLSearchParams(window.location.search);
        const skillName = params.get("skill");
        if (!skillName) {
          throw new Error("缺少 skill 参数");
        }

        const registry = await fetchJson("../registry/skills-index.json");
        const skill = registry.skills.find((item) => item.name === skillName);
        if (!skill) {
          throw new Error(`未找到 skill: ${skillName}`);
        }

        const detail = await fetchJson(`../${skill.package_root}/skill.json`);
        return { ...skill, detail };
      }

      function render(skill) {
        const app = document.getElementById("app");
        const detail = skill.detail || {};
        const implementation = detail.implementation || {};
        const requiredInputs = detail.inputs?.required || [];
        const optionalInputs = detail.inputs?.optional || [];
        const outputs = detail.outputs || [];
        const constraints = detail.constraints || [];

        const links = [
          ["SKILL.md", buildDocLink(skill, detail.entrypoint || "SKILL.md")],
          ["README.md", buildDocLink(skill, implementation.readme || "README.md")],
          ["skill.json", buildDocLink(skill, "skill.json")],
          ["INVOCATION.md", implementation.invocation_doc ? buildDocLink(skill, implementation.invocation_doc) : null]
        ].filter((item) => item[1]);

        app.innerHTML = `
          <section class="panel">
            <div class="head-row">
              <div>
                <div class="eyebrow">Skill Detail</div>
                <h1>${escapeHtml(skill.display_name || skill.name)}</h1>
              </div>
              <div class="tag-row">
                <span class="tag mono">${escapeHtml(skill.name)}</span>
                <span class="tag">${escapeHtml(detail.type || skill.type || "skill")}</span>
              </div>
            </div>
            <p class="sub">${escapeHtml(detail.description || "暂无描述")}</p>
            <div class="top-actions">
              <a class="action" href="./index.html">返回列表</a>
              <button class="action" id="downloadZipButton" type="button">下载 ZIP</button>
              ${links
                .map(
                  ([label, href]) =>
                    `<button class="action" type="button" data-preview-label="${escapeHtml(label)}" data-preview-path="${escapeHtml(href)}">${escapeHtml(label)}</button>`
                )
                .join("")}
            </div>
          </section>

          <section class="section-grid">
            <article class="section-card">
              <h2>基础信息</h2>
              <div class="tag-row">
                <span class="tag accent">${escapeHtml(detail.type || skill.type || "skill")}</span>
                <span class="tag">${detail.portable === false ? "非便携" : "整包可分发"}</span>
              </div>
              <p class="sub">包路径：<span class="mono">${escapeHtml(skill.package_root)}</span></p>
              <div class="tag-row">
                ${(skill.category_path || []).map((item) => `<span class="tag">${escapeHtml(item)}</span>`).join("")}
              </div>
            </article>

            <article class="section-card">
              <h2>平台支持</h2>
              <div class="tag-row">
                ${(detail.supported_platforms || []).map((item) => `<span class="tag accent">${escapeHtml(item)}</span>`).join("")}
              </div>
            </article>

            <article class="section-card">
              <h2>输入 / 输出</h2>
              <div class="detail-grid">
                ${requiredInputs.map((item) => `<span class="tag accent">必填：${escapeHtml(item)}</span>`).join("")}
                ${optionalInputs.map((item) => `<span class="tag">可选：${escapeHtml(item)}</span>`).join("")}
                ${outputs.map((item) => `<span class="tag">${escapeHtml(item)}</span>`).join("")}
              </div>
            </article>

            <article class="section-card">
              <h2>规则约束</h2>
              ${
                constraints.length
                  ? `<ul class="list">${constraints.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>`
                  : `<div class="hint">暂无规则约束</div>`
              }
            </article>
          </section>

          <div class="modal" id="viewerModal" hidden>
            <div class="modal-card">
              <div class="modal-head">
                <div class="hint" id="viewerTitle">文档预览</div>
                <button class="action" id="viewerClose" type="button">关闭</button>
              </div>
              <div class="modal-body">
                <pre class="modal-pre" id="viewerContent"></pre>
              </div>
            </div>
          </div>
        `;

        document.getElementById("downloadZipButton").addEventListener("click", () => {
          downloadZip(skill);
        });

        document.querySelectorAll("[data-preview-path]").forEach((button) => {
          button.addEventListener("click", () => {
            previewFile(button.dataset.previewLabel, button.dataset.previewPath);
          });
        });

        document.getElementById("viewerClose").addEventListener("click", () => {
          document.getElementById("viewerModal").hidden = true;
        });

        document.getElementById("viewerModal").addEventListener("click", (event) => {
          if (event.target.id === "viewerModal") {
            document.getElementById("viewerModal").hidden = true;
          }
        });
      }

      loadDetail()
        .then(render)
        .catch((error) => {
          document.getElementById("app").innerHTML = `
            <div class="error">
              ${escapeHtml(error.message)}<br />
              请确认通过本地 HTTP 服务访问，并带上正确的 <span class="mono">?skill=</span> 参数。
            </div>
          `;
        });
    </script>
  </body>
</html>
