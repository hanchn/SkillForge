<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkillForge</title>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
      :root {
        --bg: #ffffff;
        --bg-hover: #f3f4f6;
        --border: #e5e7eb;
        --text: #111827;
        --text-secondary: #6b7280;
        --text-tertiary: #9ca3af;
        --accent: #000000;
        --accent-hover: #374151;
        --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        --radius: 8px;
        --radius-lg: 12px;
        --radius-full: 9999px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background-color: var(--bg);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button,
      input,
      select {
        font: inherit;
        border: none;
        outline: none;
        background: none;
      }

      .app {
        max-width: 1800px;
        width: 100%;
        margin: 0 auto;
        padding: 48px 4vw;
      }

      .header {
        margin-bottom: 40px;
      }

      h1 {
        margin: 0 0 8px 0;
        font-size: 28px;
        font-weight: 600;
        letter-spacing: -0.02em;
      }

      .header-sub {
        color: var(--text-secondary);
        font-size: 15px;
      }

      .main-tabs {
        display: flex;
        border-bottom: 1px solid var(--border);
        margin-bottom: 24px;
        overflow-x: auto;
        gap: 8px;
      }

      .main-tab-btn {
        padding: 10px 16px;
        font-size: 15px;
        font-weight: 500;
        color: var(--text-secondary);
        border-bottom: 2px solid transparent;
        transition: all 0.2s;
        white-space: nowrap;
      }

      .main-tab-btn:hover {
        color: var(--text);
      }

      .main-tab-btn.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
      }

      .toolbar {
        display: flex;
        gap: 12px;
        margin-bottom: 32px;
        align-items: center;
        background: #fff;
        padding: 8px;
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-sm);
      }

      .search-wrapper {
        flex: 1;
        display: flex;
        align-items: center;
        padding: 0 12px;
      }

      .search-wrapper svg {
        width: 18px;
        height: 18px;
        color: var(--text-tertiary);
        margin-right: 12px;
      }

      .search-input {
        flex: 1;
        font-size: 15px;
        padding: 8px 0;
        color: var(--text);
      }

      .search-input::placeholder {
        color: var(--text-tertiary);
      }

      .divider {
        width: 1px;
        height: 24px;
        background: var(--border);
      }

      .category-select {
        padding: 8px 16px 8px 12px;
        font-size: 14px;
        color: var(--text);
        cursor: pointer;
        border-radius: var(--radius);
        transition: background 0.2s;
        appearance: none;
        background-image: url('data:image/svg+xml;charset=US-ASCII,<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="%236b7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>');
        background-repeat: no-repeat;
        background-position: right 8px center;
        padding-right: 28px;
        max-width: 160px;
        text-overflow: ellipsis;
        white-space: nowrap;
        overflow: hidden;
      }

      .category-select:hover {
        background-color: var(--bg-hover);
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 16px;
      }

      .card {
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 16px;
        background: #fff;
        transition: all 0.2s ease;
        display: flex;
        flex-direction: column;
        cursor: pointer;
        min-height: 190px;
        height: 100%;
        position: relative;
      }

      .card-checkbox {
        position: absolute;
        top: 16px;
        left: 16px;
        width: 18px;
        height: 18px;
        border-radius: 4px;
        border: 1px solid var(--border);
        background: #fff;
        cursor: pointer;
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
      }

      .card-checkbox:hover {
        border-color: var(--text-secondary);
      }

      .card-checkbox.checked {
        background: var(--accent);
        border-color: var(--accent);
      }

      .card-checkbox svg {
        width: 12px;
        height: 12px;
        stroke: #fff;
        stroke-width: 3;
        fill: none;
        opacity: 0;
        transition: opacity 0.2s;
      }

      .card-checkbox.checked svg {
        opacity: 1;
      }

      .card:hover {
        border-color: #d1d5db;
        box-shadow: var(--shadow-md);
        transform: translateY(-2px);
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 8px;
        padding-left: 24px; /* Space for checkbox */
      }

      .card-title {
        font-size: 15px;
        font-weight: 600;
        margin: 0;
        line-height: 1.3;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .card-path {
        font-size: 12px;
        color: var(--text-tertiary);
        margin-bottom: 8px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .card-desc {
        color: var(--text-secondary);
        font-size: 13px;
        line-height: 1.5;
        margin: 0 0 16px 0;
        display: -webkit-box;
        -webkit-line-clamp: 4;
        -webkit-box-orient: vertical;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .card-footer {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: auto;
        align-items: center;
        justify-content: space-between;
      }

      .card-tags {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        flex: 1;
      }

      .card-download-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border-radius: var(--radius);
        color: var(--text-secondary);
        background: transparent;
        opacity: 0.4;
        transition: all 0.2s;
        z-index: 2;
      }

      .card-download-btn:hover {
        background: var(--bg-hover);
        color: var(--text);
        opacity: 1;
      }

      .tag {
        font-size: 12px;
        padding: 4px 10px;
        background: var(--bg-hover);
        color: var(--text-secondary);
        border-radius: var(--radius-full);
        font-weight: 500;
      }

      .empty,
      .loading,
      .error {
        text-align: center;
        padding: 64px 20px;
        color: var(--text-secondary);
        font-size: 15px;
        background: #fff;
        border: 1px dashed var(--border);
        border-radius: var(--radius-lg);
      }

      /* Overview Dock */
      .dock-button {
        position: fixed;
        right: 24px;
        bottom: 24px;
        z-index: 30;
        width: 48px;
        height: 48px;
        border: 1px solid var(--border);
        border-radius: var(--radius-full);
        background: #fff;
        box-shadow: var(--shadow-lg);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s ease;
        color: var(--text-secondary);
      }

      .dock-button:hover {
        background: var(--bg-hover);
        color: var(--text);
      }

      .dock-panel {
        position: fixed;
        right: 24px;
        bottom: 84px;
        width: 320px;
        z-index: 29;
        background: #fff;
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-lg);
        padding: 20px;
        opacity: 0;
        transform: translateY(10px) scale(0.98);
        pointer-events: none;
        transition: all 0.2s ease;
      }

      .dock-panel.open {
        opacity: 1;
        transform: translateY(0) scale(1);
        pointer-events: auto;
      }

      .dock-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
      }

      .dock-title {
        font-size: 14px;
        font-weight: 600;
      }

      .dock-close {
        color: var(--text-tertiary);
        cursor: pointer;
        padding: 4px;
        margin: -4px;
      }

      .dock-close:hover {
        color: var(--text);
      }

      .metrics {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 20px;
      }

      .metric-item {
        background: var(--bg-hover);
        padding: 12px;
        border-radius: var(--radius);
      }

      .metric-label {
        font-size: 12px;
        color: var(--text-secondary);
        margin-bottom: 4px;
      }

      .metric-value {
        font-size: 18px;
        font-weight: 600;
        color: var(--text);
      }

      .overview-links {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .link-btn {
        display: flex;
        align-items: center;
        padding: 10px 12px;
        font-size: 13px;
        color: var(--text);
        background: #fff;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .link-btn:hover {
        background: var(--bg-hover);
      }

      .link-btn svg {
        width: 16px;
        height: 16px;
        margin-right: 8px;
        color: var(--text-secondary);
      }

      /* Modal */
      .modal {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(4px);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease;
      }

      .modal.open {
        opacity: 1;
        pointer-events: auto;
      }

      .modal-card {
        width: 100%;
        max-width: 800px;
        max-height: 85vh;
        background: #fff;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-lg);
        display: flex;
        flex-direction: column;
        transform: scale(0.98);
        transition: transform 0.2s ease;
      }

      .modal.open .modal-card {
        transform: scale(1);
      }

      .modal-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
      }

      .modal-title {
        font-weight: 600;
        font-size: 15px;
      }

      .modal-close {
        color: var(--text-secondary);
        cursor: pointer;
        padding: 4px;
      }

      .modal-close:hover {
        color: var(--text);
      }

      .modal-body {
        padding: 20px;
        overflow-y: auto;
        flex: 1;
      }

      .modal-pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 14px;
        line-height: 1.6;
        color: var(--text-secondary);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }

      @media (max-width: 640px) {
        .toolbar {
          flex-direction: column;
          align-items: stretch;
          padding: 12px;
        }
        .divider {
          display: none;
        }
        .search-wrapper {
          border-bottom: 1px solid var(--border);
          padding-bottom: 8px;
          margin-bottom: 8px;
        }
        .category-select {
          width: 100%;
        }
      }

      .batch-bar {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: #fff;
        border: 1px solid var(--border);
        box-shadow: var(--shadow-lg);
        border-radius: 32px;
        padding: 12px 24px;
        display: flex;
        align-items: center;
        gap: 16px;
        z-index: 100;
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .batch-bar.visible {
        transform: translateX(-50%) translateY(0);
      }

      .batch-count {
        font-size: 14px;
        font-weight: 500;
        color: var(--text);
      }

      .batch-actions {
        display: flex;
        gap: 8px;
      }

      .batch-btn {
        padding: 6px 16px;
        border-radius: 16px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
      }

      .batch-btn.primary {
        background: var(--accent);
        color: #fff;
      }

      .batch-btn.primary:hover {
        background: var(--accent-hover);
      }

      .batch-btn.secondary {
        background: var(--bg-hover);
        color: var(--text);
      }

      .batch-btn.secondary:hover {
        background: var(--border);
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>SkillForge</h1>
        <div class="header-sub">Skills 管理与检索</div>
      </header>

      <div class="main-tabs" id="mainTabs"></div>

      <section class="toolbar">
        <div class="search-wrapper">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input id="searchInput" class="search-input" type="search" placeholder="搜索 skill 名称、关键词、描述..." autocomplete="off" spellcheck="false" />
        </div>
        <div class="divider"></div>
        <div id="categoryFilters" style="display: flex; gap: 8px; flex-wrap: wrap; align-items: center;"></div>
      </section>

      <section id="cards" class="cards">
        <div class="loading">加载中...</div>
      </section>

      <aside class="dock-panel" id="dockPanel">
        <div class="dock-head">
          <div class="dock-title">项目概览</div>
          <button class="dock-close" id="dockClose" aria-label="关闭">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </button>
        </div>
        <div class="metrics" id="metrics"></div>
        <div class="overview-links">
          <button class="link-btn" data-view-label="项目基座 Skill" data-view-path="../skillforge-project-governance/SKILL.md">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            项目基座 Skill
          </button>
          <button class="link-btn" data-view-label="项目索引" data-view-path="../PROJECT_INDEX.md">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
            项目索引
          </button>
          <button class="link-btn" data-view-label="技能索引" data-view-path="../registry/skills-index.json">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path></svg>
            技能索引
          </button>
        </div>
      </aside>

      <button class="dock-button" id="dockButton" aria-label="项目概览">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>

      <footer style="margin-top: 60px; padding-top: 24px; border-top: 1px solid var(--border); color: var(--text-tertiary); font-size: 13px; text-align: center;">
        SkillForge 默认支持多平台 AI 复用：Claude, Codex, GPT, Manus, Trae, Qorder
      </footer>

      <div class="modal" id="viewerModal">
        <div class="modal-card">
          <div class="modal-head">
            <div class="modal-title" id="viewerTitle">预览</div>
            <button class="modal-close" id="viewerClose" aria-label="关闭">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
          </div>
          <div class="modal-body">
            <pre class="modal-pre" id="viewerContent"></pre>
          </div>
        </div>
      </div>
    </main>

    <div class="batch-bar" id="batchBar">
      <div class="batch-count">已选择 <span id="batchCount">0</span> 个 Skill</div>
      <div class="batch-actions">
        <button class="batch-btn secondary" id="batchCancel">取消</button>
        <button class="batch-btn primary" id="batchDownload">批量下载 ZIP</button>
      </div>
    </div>

    <script>
      const state = {
        skills: [],
        search: "",
        selectedPath: [],
        categoryTree: {},
        selectedSkills: new Set()
      };

      const elements = {
        mainTabs: document.getElementById("mainTabs"),
        metrics: document.getElementById("metrics"),
        cards: document.getElementById("cards"),
        searchInput: document.getElementById("searchInput"),
        categoryFilters: document.getElementById("categoryFilters"),
        dockButton: document.getElementById("dockButton"),
        dockPanel: document.getElementById("dockPanel"),
        dockClose: document.getElementById("dockClose"),
        viewerModal: document.getElementById("viewerModal"),
        viewerTitle: document.getElementById("viewerTitle"),
        viewerContent: document.getElementById("viewerContent"),
        viewerClose: document.getElementById("viewerClose"),
        batchBar: document.getElementById("batchBar"),
        batchCount: document.getElementById("batchCount"),
        batchCancel: document.getElementById("batchCancel"),
        batchDownload: document.getElementById("batchDownload")
      };

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      async function fetchJson(path) {
        const response = await fetch(path);
        if (!response.ok) throw new Error(`读取失败: ${path}`);
        return response.json();
      }

      async function fetchText(path) {
        const response = await fetch(path);
        if (!response.ok) throw new Error(`读取失败: ${path}`);
        return response.text();
      }

      function getDocUrl(path) {
        return encodeURI(path).replace(/#/g, "%23");
      }

      async function loadData() {
        const skillsRegistry = await fetchJson("../registry/skills-index.json");
        state.skills = await Promise.all(
          skillsRegistry.skills
            .filter((item) => item.dashboard_visible !== false)
            .map(async (item) => {
            try {
              const detailUrl = getDocUrl(`../${item.package_root}/skill.json`);
              const detail = await fetchJson(detailUrl);
              return { ...item, detail };
            } catch (err) {
              console.error("Failed to load skill detail:", item.package_root, err);
              return { ...item, detail: {} };
            }
          })
        );

        // Build category tree
        state.skills.forEach(skill => {
          if (skill.category_path && skill.category_path.length) {
            let current = state.categoryTree;
            skill.category_path.forEach(part => {
              if (!current[part]) current[part] = {};
              current = current[part];
            });
          }
        });

        render();
      }

      function renderTabs() {
        const topLevels = Object.keys(state.categoryTree).sort();
        const currentTop = state.selectedPath.length > 0 ? state.selectedPath[0] : "";

        let html = `<button class="main-tab-btn ${currentTop === "" ? 'active' : ''}" data-top="">全部分类</button>`;
        
        topLevels.forEach(top => {
          html += `<button class="main-tab-btn ${currentTop === top ? 'active' : ''}" data-top="${escapeHtml(top)}">${escapeHtml(top)}</button>`;
        });

        elements.mainTabs.innerHTML = html;

        elements.mainTabs.querySelectorAll('.main-tab-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const top = e.target.dataset.top;
            if (top) {
              state.selectedPath = [top];
            } else {
              state.selectedPath = [];
            }
            render();
          });
        });
      }

      function renderFilters() {
        elements.categoryFilters.innerHTML = "";
        if (state.selectedPath.length === 0) return;

        const topLevel = state.selectedPath[0];
        let currentTree = state.categoryTree[topLevel];
        let level = 1;

        while (currentTree && Object.keys(currentTree).length > 0) {
          const select = document.createElement("select");
          select.className = "category-select";
          select.dataset.level = level;
          
          const defaultOption = document.createElement("option");
          defaultOption.value = "";
          defaultOption.textContent = "全部子类";
          select.appendChild(defaultOption);

          const options = Object.keys(currentTree).sort();
          options.forEach(opt => {
            const optionEl = document.createElement("option");
            optionEl.value = opt;
            optionEl.textContent = opt;
            select.appendChild(optionEl);
          });

          const selectedVal = state.selectedPath[level];
          if (selectedVal && currentTree[selectedVal]) {
            select.value = selectedVal;
          }

          select.addEventListener("change", (e) => {
            const lvl = parseInt(e.target.dataset.level, 10);
            const val = e.target.value;
            
            if (val) {
              state.selectedPath = state.selectedPath.slice(0, lvl);
              state.selectedPath.push(val);
            } else {
              state.selectedPath = state.selectedPath.slice(0, lvl);
            }
            
            render();
          });

          elements.categoryFilters.appendChild(select);

          if (selectedVal && currentTree[selectedVal]) {
            currentTree = currentTree[selectedVal];
            level++;
          } else {
            break;
          }
        }
      }

      function render() {
        renderTabs();
        renderFilters();
        renderMetrics();
        renderCards();
      }

      function getFilteredSkills() {
        return state.skills.filter((skill) => {
          const query = state.search.trim().toLowerCase();
          const haystack = [
            skill.name,
            skill.display_name,
            ...(skill.category_path || []),
            ...(skill.detail?.supported_platforms || []),
            ...(skill.search_keywords || []),
            skill.detail?.description || ""
          ].join(" ").toLowerCase();

          const matchesSearch = !query || haystack.includes(query);
          
          let matchesCategory = true;
          if (state.selectedPath.length > 0) {
            const skillPath = skill.category_path || [];
            for (let i = 0; i < state.selectedPath.length; i++) {
              if (skillPath[i] !== state.selectedPath[i]) {
                matchesCategory = false;
                break;
              }
            }
          }

          return matchesSearch && matchesCategory;
        });
      }

      function renderMetrics() {
        const platforms = new Set(state.skills.flatMap((item) => item.detail?.supported_platforms || []));

        elements.metrics.innerHTML = [
          { label: "Skills 总数", value: state.skills.length },
          { label: "平台覆盖", value: platforms.size }
        ]
          .map(
            (item) => `
              <div class="metric-item">
                <div class="metric-label">${item.label}</div>
                <div class="metric-value">${item.value}</div>
              </div>
            `
          )
          .join("");
      }

      function renderCards() {
        const filtered = getFilteredSkills();
        if (!filtered.length) {
          elements.cards.innerHTML = `<div class="empty">无匹配结果</div>`;
          return;
        }

        elements.cards.innerHTML = filtered
          .map((skill) => {
            const detail = skill.detail || {};
            const detailUrl = `./detail.html?skill=${encodeURIComponent(skill.name)}`;
            const pathStr = (skill.category_path || []).join(" / ") || "未分类";

            const isChecked = state.selectedSkills.has(skill.name);
            const checkedClass = isChecked ? "checked" : "";
            
            return `
              <div class="card" onclick="window.location.href='${detailUrl}'">
                <div class="card-checkbox ${checkedClass}" data-name="${skill.name}" onclick="event.stopPropagation()">
                  <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                </div>
                <div class="card-header">
                  <h2 class="card-title">${skill.display_name || skill.name}</h2>
                </div>
                <div class="card-path">${pathStr}</div>
                <p class="card-desc">${detail.description || "暂无描述"}</p>
                <div class="card-footer">
                  <div class="card-tags">
                    <span class="tag">${skill.category_path ? skill.category_path[skill.category_path.length - 1] : "通用"}</span>
                  </div>
                  <button class="card-download-btn" data-name="${skill.name}" title="下载 ZIP" onclick="event.stopPropagation()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                  </button>
                </div>
              </div>
            `;
          })
          .join("");

        // Bind checkbox events
        elements.cards.querySelectorAll('.card-checkbox').forEach(cb => {
          cb.addEventListener('click', (e) => {
            const name = e.currentTarget.dataset.name;
            const isCurrentlyChecked = state.selectedSkills.has(name);
            
            if (isCurrentlyChecked) {
              state.selectedSkills.delete(name);
              e.currentTarget.classList.remove('checked');
            } else {
              state.selectedSkills.add(name);
              e.currentTarget.classList.add('checked');
            }
            updateBatchBar();
          });
        });

        // Bind individual download events
        elements.cards.querySelectorAll('.card-download-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const name = e.currentTarget.dataset.name;
            const skill = state.skills.find(s => s.name === name);
            if (skill) downloadSkillZip(skill, e.currentTarget);
          });
        });
      }

      function updateBatchBar() {
        elements.batchCount.textContent = state.selectedSkills.size;
        if (state.selectedSkills.size > 0) {
          elements.batchBar.classList.add('visible');
        } else {
          elements.batchBar.classList.remove('visible');
        }
      }

      elements.batchCancel.addEventListener('click', () => {
        state.selectedSkills.clear();
        renderCards();
        updateBatchBar();
      });

      elements.batchDownload.addEventListener('click', async () => {
        const selected = Array.from(state.selectedSkills);
        if (selected.length === 0) return;
        
        const btn = elements.batchDownload;
        const originalText = btn.textContent;
        btn.textContent = "打包中...";
        btn.style.pointerEvents = "none";

        try {
          const zip = new window.JSZip();
          const mainFolder = zip.folder("skills_batch_export");
          
          for (const name of selected) {
            const skill = state.skills.find(s => s.name === name);
            if (!skill) continue;
            
            const detail = skill.detail || {};
            const distribution = detail.distribution || {};
            const packageFiles = distribution.package_files || distribution.required_files || [];
            
            if (!packageFiles.length) continue;
            
            const skillFolder = mainFolder.folder(skill.name);
            await Promise.all(
              packageFiles.map(async (relativePath) => {
                try {
                  const fileUrl = getDocUrl(`../${skill.package_root}/${relativePath}`);
                  const response = await fetch(fileUrl);
                  if (response.ok) {
                    const content = await response.blob();
                    skillFolder.file(relativePath, content);
                  }
                } catch (err) {
                  console.error("Fetch failed", err);
                }
              })
            );
          }

          const blob = await zip.generateAsync({ type: "blob" });
          const url = URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.href = url;
          link.download = `skills_batch_export.zip`;
          document.body.appendChild(link);
          link.click();
          link.remove();
          URL.revokeObjectURL(url);
          
          // Clear selection after download
          state.selectedSkills.clear();
          renderCards();
          updateBatchBar();
        } catch (err) {
          window.alert("批量打包失败：" + err.message);
        } finally {
          btn.textContent = originalText;
          btn.style.pointerEvents = "";
        }
      });

      async function downloadSkillZip(skill, btnElement) {
        const detail = skill.detail || {};
        const distribution = detail.distribution || {};
        const packageFiles = distribution.package_files || distribution.required_files || [];

        if (!packageFiles.length) {
          window.alert("当前 skill 没有可打包的文件清单。");
          return;
        }

        if (!window.JSZip) {
          window.alert("ZIP 依赖加载失败。");
          return;
        }

        btnElement.style.opacity = "0.5";
        btnElement.style.pointerEvents = "none";

        try {
          const zip = new window.JSZip();

          await Promise.all(
            packageFiles.map(async (relativePath) => {
              try {
                const fileUrl = getDocUrl(`../${skill.package_root}/${relativePath}`);
                const response = await fetch(fileUrl);
                if (response.ok) {
                  const content = await response.blob();
                  zip.file(`${skill.name}/${relativePath}`, content);
                }
              } catch (e) {}
            })
          );

          const blob = await zip.generateAsync({ type: "blob" });
          const url = URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.href = url;
          link.download = `${skill.name}.zip`;
          document.body.appendChild(link);
          link.click();
          link.remove();
          URL.revokeObjectURL(url);
        } catch (error) {
          window.alert(error.message || "ZIP 打包失败");
        } finally {
          btnElement.style.opacity = "1";
          btnElement.style.pointerEvents = "auto";
        }
      }

      elements.searchInput.addEventListener("input", (e) => {
        state.search = e.target.value;
        renderCards();
      });

      elements.dockButton.addEventListener("click", () => {
        elements.dockPanel.classList.toggle("open");
      });

      elements.dockClose.addEventListener("click", () => {
        elements.dockPanel.classList.remove("open");
      });

      // Modal logic
      function openModal(title, content) {
        elements.viewerTitle.textContent = title;
        elements.viewerContent.textContent = content;
        elements.viewerModal.classList.add("open");
      }

      elements.viewerClose.addEventListener("click", () => {
        elements.viewerModal.classList.remove("open");
      });

      elements.viewerModal.addEventListener("click", (e) => {
        if (e.target === elements.viewerModal) {
          elements.viewerModal.classList.remove("open");
        }
      });

      document.addEventListener("click", async (e) => {
        const btn = e.target.closest("[data-view-path]");
        if (!btn) return;

        try {
          const path = btn.dataset.viewPath;
          let content = await fetchText(path);
          if (path.endsWith(".json")) {
            content = JSON.stringify(JSON.parse(content), null, 2);
          }
          openModal(btn.dataset.viewLabel || "文档预览", content);
        } catch (error) {
          openModal("读取失败", error.message || "文档读取失败");
        }
      });

      loadData().catch((error) => {
        elements.cards.innerHTML = `<div class="error">页面未能读取数据，请通过 HTTP 服务访问。<br>${error.message}</div>`;
      });
    </script>
  </body>
</html>
