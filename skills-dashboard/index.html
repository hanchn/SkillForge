<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkillForge Skills 管理台</title>
    <style>
      :root {
        --bg: #f4f5f7;
        --panel: rgba(255, 255, 255, 0.76);
        --panel-strong: rgba(255, 255, 255, 0.92);
        --panel-border: rgba(15, 23, 42, 0.08);
        --text: #101828;
        --text-soft: #667085;
        --text-dim: #98a2b3;
        --accent: #335c81;
        --accent-soft: rgba(51, 92, 129, 0.12);
        --shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
        --radius-xl: 28px;
        --radius-lg: 22px;
        --radius-md: 16px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(51, 92, 129, 0.08), transparent 28%),
          radial-gradient(circle at top right, rgba(15, 23, 42, 0.06), transparent 26%),
          linear-gradient(180deg, #fafafb 0%, #eef1f4 100%);
        color: var(--text);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.22) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.22) 1px, transparent 1px);
        background-size: 28px 28px;
        mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.4), transparent 72%);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button,
      input {
        font: inherit;
      }

      .app {
        max-width: 1440px;
        margin: 0 auto;
        padding: 32px 24px 48px;
      }

      .header-bar,
      .toolbar,
      .dock-panel,
      .metric-card,
      .card {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .header-bar,
      .dock-panel {
        border-radius: var(--radius-xl);
        padding: 16px 18px;
      }

      .header-bar,
      .toolbar {
        margin-bottom: 16px;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.76);
        color: var(--text-soft);
        font-size: 12px;
        letter-spacing: 0.06em;
      }

      .header-bar {
        display: flex;
        gap: 14px;
        align-items: center;
        justify-content: space-between;
      }

      .header-title {
        display: flex;
        gap: 12px;
        align-items: center;
      }

      h1 {
        margin: 0;
        font-size: 20px;
        line-height: 1.2;
        letter-spacing: -0.03em;
      }

      .header-sub {
        color: var(--text-soft);
        font-size: 13px;
      }

      .overview-links {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .hero-link,
      .detail-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        border-radius: 999px;
        background: var(--panel-strong);
        border: 1px solid rgba(15, 23, 42, 0.07);
        transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
        font-size: 13px;
      }

      .hero-link:hover,
      .detail-link:hover {
        transform: translateY(-1px);
        border-color: rgba(51, 92, 129, 0.2);
        background: #fff;
      }

      .overview-copy {
        margin: 0;
        color: var(--text-soft);
        line-height: 1.75;
        font-size: 14px;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 16px;
      }

      .metrics.compact {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .metric-card {
        border-radius: var(--radius-lg);
        padding: 16px 16px;
      }

      .metric-label {
        color: var(--text-soft);
        font-size: 12px;
      }

      .metric-value {
        margin-top: 10px;
        font-size: 24px;
        letter-spacing: -0.04em;
      }

      .toolbar {
        border-radius: var(--radius-xl);
        padding: 18px;
        margin-bottom: 22px;
      }

      .toolbar-row {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        align-items: center;
      }

      .search-input {
        width: 100%;
        border: 1px solid rgba(15, 23, 42, 0.08);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.92);
        padding: 16px 18px;
        outline: none;
      }

      .search-input:focus {
        border-color: rgba(51, 92, 129, 0.4);
        box-shadow: 0 0 0 4px rgba(51, 92, 129, 0.08);
      }

      .hint {
        color: var(--text-dim);
        font-size: 13px;
      }

      .filters {
        display: grid;
        gap: 14px;
        margin-top: 16px;
      }

      .filter-group {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .filter-label {
        min-width: 72px;
        color: var(--text-soft);
        font-size: 13px;
      }

      .chip,
      .tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 11px;
        border-radius: 999px;
        font-size: 12px;
      }

      .chip {
        border: 1px solid rgba(15, 23, 42, 0.08);
        background: rgba(255, 255, 255, 0.82);
        color: var(--text-soft);
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .chip.active,
      .chip:hover {
        background: var(--accent-soft);
        border-color: rgba(51, 92, 129, 0.18);
        color: var(--accent);
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 16px;
      }

      .card {
        border-radius: var(--radius-lg);
        padding: 18px;
        transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
      }

      .card:hover {
        transform: translateY(-2px);
        border-color: rgba(51, 92, 129, 0.24);
        background: rgba(255, 255, 255, 0.92);
      }

      .card-top,
      .meta-row,
      .tag-row,
      .card-footer {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .card-title {
        margin: 14px 0 8px;
        font-size: 18px;
        line-height: 1.25;
      }

      .description {
        margin: 0;
        color: var(--text-soft);
        line-height: 1.7;
        font-size: 14px;
        min-height: 48px;
      }

      .tag {
        background: rgba(15, 23, 42, 0.05);
        color: var(--text-soft);
      }

      .tag.accent {
        background: var(--accent-soft);
        color: var(--accent);
      }

      .mono {
        font-family: "SFMono-Regular", "Consolas", "Menlo", monospace;
      }

      .card-footer {
        margin-top: 14px;
        align-items: center;
        justify-content: space-between;
      }

      .detail-link {
        padding: 10px 14px;
        border-radius: 14px;
      }

      .empty,
      .loading,
      .error {
        padding: 28px;
        border-radius: var(--radius-lg);
        background: rgba(255, 255, 255, 0.82);
        border: 1px dashed rgba(15, 23, 42, 0.12);
        color: var(--text-soft);
      }

      .dock-button {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 30;
        width: 52px;
        height: 52px;
        border: 1px solid rgba(15, 23, 42, 0.08);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }

      .dock-button:hover {
        border-color: rgba(51, 92, 129, 0.24);
      }

      .dock-button svg {
        width: 20px;
        height: 20px;
        stroke: var(--text-soft);
      }

      .dock-panel {
        position: fixed;
        right: 18px;
        bottom: 82px;
        width: min(360px, calc(100vw - 28px));
        z-index: 29;
      }

      .dock-panel[hidden] {
        display: none;
      }

      .dock-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .dock-title {
        font-size: 14px;
        color: var(--text-soft);
      }

      .dock-close {
        border: 0;
        background: transparent;
        color: var(--text-dim);
        cursor: pointer;
      }

      .modal {
        position: fixed;
        inset: 0;
        z-index: 60;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: rgba(15, 23, 42, 0.24);
        backdrop-filter: blur(10px);
      }

      .modal[hidden] {
        display: none;
      }

      .modal-card {
        width: min(920px, 100%);
        max-height: min(82vh, 900px);
        overflow: hidden;
        background: rgba(255, 255, 255, 0.95);
        border: 1px solid rgba(15, 23, 42, 0.08);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow);
      }

      .modal-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 16px 18px;
        border-bottom: 1px solid rgba(15, 23, 42, 0.08);
      }

      .modal-title {
        font-size: 14px;
        color: var(--text-soft);
      }

      .modal-close {
        border: 0;
        background: transparent;
        color: var(--text-dim);
        cursor: pointer;
      }

      .modal-body {
        padding: 18px;
        max-height: calc(82vh - 64px);
        overflow: auto;
      }

      .modal-pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        color: var(--text-soft);
        line-height: 1.7;
      }

      @media (max-width: 980px) {
        .metrics {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 760px) {
        .app {
          padding: 18px 14px 28px;
        }

        .header-bar {
          flex-direction: column;
          align-items: flex-start;
        }

        .metrics {
          grid-template-columns: 1fr;
        }

        .dock-panel {
          width: calc(100vw - 28px);
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="header-bar">
        <div class="header-title">
          <div class="eyebrow">Skills</div>
          <div>
            <h1>Skill 管理</h1>
            <div class="header-sub">列表页只负责检索和浏览，详情进入二级页。</div>
          </div>
        </div>
      </section>

      <section class="toolbar">
        <div class="toolbar-row">
          <input id="searchInput" class="search-input" type="search" placeholder="搜索 skill 名称、展示名、路径、关键词、描述..." />
          <div class="filter-group">
            <div class="filter-label">类型</div>
            <div id="typeFilters"></div>
          </div>
          <div class="filter-group">
            <div class="filter-label">平台</div>
            <div id="platformFilters"></div>
          </div>
          <div class="hint">详情已拆成二级页。建议通过本地 HTTP 服务访问。</div>
        </div>
      </section>

      <section id="cards" class="cards">
        <div class="loading">正在读取项目索引和 skill 包信息...</div>
      </section>

      <aside class="dock-panel" id="dockPanel" hidden>
        <div class="dock-head">
          <div class="dock-title">项目概览</div>
          <button class="dock-close" id="dockClose" type="button">收起</button>
        </div>
        <p class="overview-copy">
          页面直接读取现有索引和各个 <span class="mono">skill.json</span>，不手写重复数据。适合作为人和 AI 的统一检索入口。
        </p>
        <div class="overview-links" style="margin-top: 12px;">
          <button class="hero-link" type="button" data-view-label="项目基座 Skill" data-view-path="../skillforge-project-governance/SKILL.md">项目基座 Skill</button>
          <button class="hero-link" type="button" data-view-label="项目索引" data-view-path="../PROJECT_INDEX.md">项目索引</button>
          <button class="hero-link" type="button" data-view-label="技能索引" data-view-path="../registry/skills-index.json">技能索引</button>
        </div>
        <section class="metrics compact" id="metrics"></section>
      </aside>

      <button class="dock-button" id="dockButton" type="button" aria-label="打开项目概览">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 3.75l1.19 2.56a1 1 0 0 0 .77.56l2.82.32-2.08 1.94a1 1 0 0 0-.3.9l.56 2.78-2.5-1.39a1 1 0 0 0-.92 0l-2.5 1.39.56-2.78a1 1 0 0 0-.3-.9L7.22 7.19l2.82-.32a1 1 0 0 0 .77-.56L12 3.75z"></path>
          <circle cx="12" cy="12.5" r="3.2"></circle>
        </svg>
      </button>

      <div class="modal" id="viewerModal" hidden>
        <div class="modal-card">
          <div class="modal-head">
            <div class="modal-title" id="viewerTitle">文档预览</div>
            <button class="modal-close" id="viewerClose" type="button">关闭</button>
          </div>
          <div class="modal-body">
            <pre class="modal-pre" id="viewerContent"></pre>
          </div>
        </div>
      </div>
    </main>

    <script>
      const state = {
        skills: [],
        search: "",
        activeType: "全部",
        activePlatform: "全部"
      };

      const elements = {
        metrics: document.getElementById("metrics"),
        cards: document.getElementById("cards"),
        typeFilters: document.getElementById("typeFilters"),
        platformFilters: document.getElementById("platformFilters"),
        searchInput: document.getElementById("searchInput"),
        dockButton: document.getElementById("dockButton"),
        dockPanel: document.getElementById("dockPanel"),
        dockClose: document.getElementById("dockClose"),
        viewerModal: document.getElementById("viewerModal"),
        viewerTitle: document.getElementById("viewerTitle"),
        viewerContent: document.getElementById("viewerContent"),
        viewerClose: document.getElementById("viewerClose")
      };

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      async function fetchJson(path) {
        const response = await fetch(path);
        if (!response.ok) {
          throw new Error(`读取失败: ${path}`);
        }
        return response.json();
      }

      async function fetchText(path) {
        const response = await fetch(path);
        if (!response.ok) {
          throw new Error(`读取失败: ${path}`);
        }
        return response.text();
      }

      async function loadData() {
        const skillsRegistry = await fetchJson("../registry/skills-index.json");
        state.skills = await Promise.all(
          skillsRegistry.skills.map(async (item) => {
            const detail = await fetchJson(`../${item.package_root}/skill.json`);
            return {
              ...item,
              detail
            };
          })
        );
        render();
      }

      function getFilteredSkills() {
        return state.skills.filter((skill) => {
          const query = state.search.trim().toLowerCase();
          const haystack = [
            skill.name,
            skill.display_name,
            ...(skill.category_path || []),
            ...(skill.detail?.supported_platforms || []),
            ...(skill.detail?.constraints || []),
            ...(skill.search_keywords || []),
            skill.detail?.description || ""
          ]
            .join(" ")
            .toLowerCase();

          const matchesSearch = !query || haystack.includes(query);
          const matchesType = state.activeType === "全部" || (skill.detail?.type || skill.type) === state.activeType;
          const matchesPlatform =
            state.activePlatform === "全部" ||
            (skill.detail?.supported_platforms || []).includes(state.activePlatform);

          return matchesSearch && matchesType && matchesPlatform;
        });
      }

      function renderMetrics() {
        const domains = new Set(state.skills.flatMap((item) => item.category_path || []).filter(Boolean));
        const platforms = new Set(state.skills.flatMap((item) => item.detail?.supported_platforms || []));

        elements.metrics.innerHTML = [
          { label: "Skill 总数", value: state.skills.length },
          { label: "业务域标签", value: domains.size },
          { label: "平台覆盖", value: platforms.size },
          { label: "可单独分发", value: state.skills.filter((item) => item.detail?.portable !== false).length }
        ]
          .map(
            (item) => `
              <article class="metric-card">
                <div class="metric-label">${item.label}</div>
                <div class="metric-value">${item.value}</div>
              </article>
            `
          )
          .join("");
      }

      function renderFilterChips() {
        const types = ["全部", ...new Set(state.skills.map((item) => item.detail?.type || item.type).filter(Boolean))];
        const platforms = ["全部", ...new Set(state.skills.flatMap((item) => item.detail?.supported_platforms || []))];

        elements.typeFilters.innerHTML = types
          .map(
            (type) =>
              `<button class="chip ${state.activeType === type ? "active" : ""}" data-filter-type="${escapeHtml(type)}">${escapeHtml(type)}</button>`
          )
          .join("");

        elements.platformFilters.innerHTML = platforms
          .map(
            (platform) =>
              `<button class="chip ${state.activePlatform === platform ? "active" : ""}" data-filter-platform="${escapeHtml(platform)}">${escapeHtml(platform)}</button>`
          )
          .join("");

        document.querySelectorAll("[data-filter-type]").forEach((button) => {
          button.addEventListener("click", () => {
            state.activeType = button.dataset.filterType;
            renderCards();
            renderFilterChips();
          });
        });

        document.querySelectorAll("[data-filter-platform]").forEach((button) => {
          button.addEventListener("click", () => {
            state.activePlatform = button.dataset.filterPlatform;
            renderCards();
            renderFilterChips();
          });
        });
      }

      function renderCards() {
        const filtered = getFilteredSkills();
        if (!filtered.length) {
          elements.cards.innerHTML = `<div class="empty">没有匹配到结果，试试换个关键词或取消平台筛选。</div>`;
          return;
        }

        elements.cards.innerHTML = filtered
          .map((skill) => {
            const detail = skill.detail || {};
            const detailUrl = `./detail.html?skill=${encodeURIComponent(skill.name)}`;

            return `
              <article class="card">
                <div class="card-top">
                  <span class="tag accent">${escapeHtml(detail.type || skill.type || "skill")}</span>
                  <span class="tag">${detail.portable === false ? "非便携" : "可分发"}</span>
                </div>
                <h2 class="card-title">${escapeHtml(skill.display_name || skill.name)}</h2>
                <div class="meta-row">
                  <span class="tag mono">${escapeHtml(skill.name)}</span>
                  <span class="tag">${escapeHtml((skill.category_path || []).join(" / ") || "未分类")}</span>
                </div>
                <p class="description">${escapeHtml(detail.description || "暂无描述")}</p>
                <div class="tag-row">
                  ${(detail.supported_platforms || []).map((platform) => `<span class="tag">${escapeHtml(platform)}</span>`).join("")}
                </div>
                <div class="card-footer">
                  <span class="hint">包路径：${escapeHtml(skill.package_root)}</span>
                  <a class="detail-link" href="${escapeHtml(detailUrl)}">查看详情</a>
                </div>
              </article>
            `;
          })
          .join("");
      }

      function render() {
        renderMetrics();
        renderFilterChips();
        renderCards();
      }

      elements.searchInput.addEventListener("input", (event) => {
        state.search = event.target.value;
        renderCards();
      });

      elements.dockButton.addEventListener("click", () => {
        elements.dockPanel.hidden = !elements.dockPanel.hidden;
      });

      elements.dockClose.addEventListener("click", () => {
        elements.dockPanel.hidden = true;
      });

      elements.viewerClose.addEventListener("click", () => {
        elements.viewerModal.hidden = true;
      });

      elements.viewerModal.addEventListener("click", (event) => {
        if (event.target === elements.viewerModal) {
          elements.viewerModal.hidden = true;
        }
      });

      document.addEventListener("click", async (event) => {
        const button = event.target.closest("[data-view-path]");
        if (!button) {
          return;
        }

        try {
          const path = button.dataset.viewPath;
          let content = await fetchText(path);
          if (path.endsWith(".json")) {
            content = JSON.stringify(JSON.parse(content), null, 2);
          }
          elements.viewerTitle.textContent = button.dataset.viewLabel || "文档预览";
          elements.viewerContent.textContent = content;
          elements.viewerModal.hidden = false;
        } catch (error) {
          elements.viewerTitle.textContent = "读取失败";
          elements.viewerContent.textContent = error.message || "文档读取失败";
          elements.viewerModal.hidden = false;
        }
      });

      loadData().catch((error) => {
        elements.cards.innerHTML = `
          <div class="error">
            页面未能读取项目索引：${escapeHtml(error.message)}<br />
            请在项目根目录通过本地 HTTP 服务打开这个页面，例如：<span class="mono">python3 -m http.server 4173</span>
          </div>
        `;
      });
    </script>
  </body>
</html>
