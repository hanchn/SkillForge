<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkillForge Skills 管理台</title>
    <style>
      :root {
        --bg: #f4f5f7;
        --panel: rgba(255, 255, 255, 0.74);
        --panel-strong: rgba(255, 255, 255, 0.92);
        --panel-border: rgba(15, 23, 42, 0.08);
        --text: #101828;
        --text-soft: #667085;
        --text-dim: #98a2b3;
        --accent: #335c81;
        --accent-soft: rgba(51, 92, 129, 0.12);
        --shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
        --radius-xl: 28px;
        --radius-lg: 22px;
        --radius-md: 16px;
        --radius-sm: 12px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(51, 92, 129, 0.08), transparent 28%),
          radial-gradient(circle at top right, rgba(15, 23, 42, 0.06), transparent 26%),
          linear-gradient(180deg, #fafafb 0%, #eef1f4 100%);
        color: var(--text);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.22) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.22) 1px, transparent 1px);
        background-size: 28px 28px;
        mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.42), transparent 70%);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button,
      input {
        font: inherit;
      }

      .app {
        max-width: 1480px;
        margin: 0 auto;
        padding: 32px 24px 48px;
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1.35fr) minmax(320px, 0.65fr);
        gap: 20px;
        margin-bottom: 24px;
      }

      .hero-card,
      .metric-card,
      .toolbar,
      .card,
      .detail-panel {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .hero-card {
        border-radius: var(--radius-xl);
        padding: 28px;
        position: relative;
        overflow: hidden;
      }

      .hero-card::after {
        content: "";
        position: absolute;
        inset: auto -40px -72px auto;
        width: 220px;
        height: 220px;
        background: radial-gradient(circle, rgba(51, 92, 129, 0.12), transparent 68%);
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.76);
        color: var(--text-soft);
        font-size: 12px;
        letter-spacing: 0.06em;
      }

      h1 {
        margin: 18px 0 12px;
        font-size: 40px;
        line-height: 1.08;
        letter-spacing: -0.04em;
      }

      .hero-copy {
        margin: 0;
        max-width: 62ch;
        color: var(--text-soft);
        line-height: 1.8;
        font-size: 15px;
      }

      .hero-links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 24px;
      }

      .hero-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 14px;
        border-radius: 999px;
        background: var(--panel-strong);
        border: 1px solid rgba(15, 23, 42, 0.07);
        color: var(--text);
        transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
      }

      .hero-link:hover {
        transform: translateY(-1px);
        border-color: rgba(51, 92, 129, 0.2);
        background: #fff;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .metric-card {
        border-radius: var(--radius-lg);
        padding: 22px 20px;
      }

      .metric-label {
        color: var(--text-soft);
        font-size: 13px;
      }

      .metric-value {
        margin-top: 16px;
        font-size: 36px;
        letter-spacing: -0.04em;
      }

      .toolbar {
        border-radius: var(--radius-xl);
        padding: 18px;
        margin-bottom: 22px;
      }

      .search-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 14px;
        align-items: center;
      }

      .search-input {
        width: 100%;
        border: 1px solid rgba(15, 23, 42, 0.08);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.92);
        padding: 16px 18px;
        outline: none;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      .search-input:focus {
        border-color: rgba(51, 92, 129, 0.4);
        box-shadow: 0 0 0 4px rgba(51, 92, 129, 0.08);
      }

      .hint {
        color: var(--text-dim);
        font-size: 13px;
      }

      .filters {
        display: grid;
        gap: 14px;
        margin-top: 16px;
      }

      .filter-group {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .filter-label {
        min-width: 72px;
        color: var(--text-soft);
        font-size: 13px;
      }

      .chip {
        padding: 9px 12px;
        border: 1px solid rgba(15, 23, 42, 0.08);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.82);
        color: var(--text-soft);
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .chip.active,
      .chip:hover {
        background: var(--accent-soft);
        border-color: rgba(51, 92, 129, 0.18);
        color: var(--accent);
      }

      .content {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 380px;
        gap: 20px;
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 16px;
      }

      .card {
        border-radius: var(--radius-lg);
        padding: 18px;
        cursor: pointer;
        transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
      }

      .card:hover,
      .card.active {
        transform: translateY(-2px);
        border-color: rgba(51, 92, 129, 0.24);
        background: rgba(255, 255, 255, 0.92);
      }

      .card-top,
      .meta-row,
      .tag-row,
      .detail-actions,
      .detail-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .card-title {
        margin: 14px 0 8px;
        font-size: 18px;
        line-height: 1.25;
      }

      .mono {
        font-family: "SFMono-Regular", "Consolas", "Menlo", monospace;
      }

      .description {
        margin: 0;
        color: var(--text-soft);
        line-height: 1.7;
        font-size: 14px;
        min-height: 72px;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 7px 10px;
        border-radius: 999px;
        font-size: 12px;
        background: rgba(15, 23, 42, 0.05);
        color: var(--text-soft);
      }

      .tag.accent {
        background: var(--accent-soft);
        color: var(--accent);
      }

      .detail-panel {
        border-radius: var(--radius-xl);
        padding: 22px;
        position: sticky;
        top: 24px;
        align-self: start;
      }

      .detail-title {
        margin: 14px 0 6px;
        font-size: 28px;
        line-height: 1.1;
      }

      .detail-sub {
        color: var(--text-soft);
        line-height: 1.8;
        font-size: 14px;
      }

      .section {
        margin-top: 22px;
        padding-top: 18px;
        border-top: 1px solid rgba(15, 23, 42, 0.08);
      }

      .section h3 {
        margin: 0 0 12px;
        font-size: 14px;
        color: var(--text-soft);
        letter-spacing: 0.03em;
      }

      .detail-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-width: 120px;
        padding: 12px 14px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid rgba(15, 23, 42, 0.08);
        transition: transform 0.2s ease, border-color 0.2s ease;
      }

      .detail-link:hover {
        transform: translateY(-1px);
        border-color: rgba(51, 92, 129, 0.22);
      }

      .list {
        margin: 0;
        padding-left: 18px;
        color: var(--text-soft);
        line-height: 1.8;
      }

      .empty,
      .loading,
      .error {
        padding: 28px;
        border-radius: var(--radius-lg);
        background: rgba(255, 255, 255, 0.82);
        border: 1px dashed rgba(15, 23, 42, 0.12);
        color: var(--text-soft);
      }

      .footer-note {
        margin-top: 18px;
        color: var(--text-dim);
        font-size: 12px;
        line-height: 1.7;
      }

      @media (max-width: 1180px) {
        .hero,
        .content {
          grid-template-columns: 1fr;
        }

        .detail-panel {
          position: static;
        }
      }

      @media (max-width: 760px) {
        .app {
          padding: 18px 14px 28px;
        }

        h1 {
          font-size: 30px;
        }

        .metrics {
          grid-template-columns: 1fr 1fr;
        }

        .search-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="hero">
        <article class="hero-card">
          <div class="eyebrow">SkillForge / Skills Dashboard</div>
          <h1>可视化 Skills 管理台</h1>
          <p class="hero-copy">
            用卡片和详情抽屉统一浏览整个仓库里的 skill。页面直接读取现有索引和各个
            <span class="mono">skill.json</span>，不手写重复数据，适合作为人和 AI 的统一入口。
          </p>
          <div class="hero-links">
            <a class="hero-link" href="../PROJECT_INDEX.md" target="_blank" rel="noreferrer">打开项目索引</a>
            <a class="hero-link" href="../registry/skills-index.json" target="_blank" rel="noreferrer">打开技能索引</a>
            <a class="hero-link" href="../skillforge-project-governance/SKILL.md" target="_blank" rel="noreferrer">打开项目基座 Skill</a>
          </div>
        </article>
        <section class="metrics" id="metrics"></section>
      </section>

      <section class="toolbar">
        <div class="search-row">
          <input id="searchInput" class="search-input" type="search" placeholder="搜索 skill 名称、展示名、路径、关键词、描述..." />
          <div class="hint">建议通过本地 HTTP 服务访问，便于读取 JSON 与 Markdown 文件。</div>
        </div>
        <div class="filters">
          <div class="filter-group">
            <div class="filter-label">类型</div>
            <div id="typeFilters"></div>
          </div>
          <div class="filter-group">
            <div class="filter-label">平台</div>
            <div id="platformFilters"></div>
          </div>
        </div>
      </section>

      <section class="content">
        <section>
          <div id="cards" class="cards">
            <div class="loading">正在读取项目索引和 skill 包信息...</div>
          </div>
        </section>
        <aside id="detailPanel" class="detail-panel">
          <div class="loading">点击左侧 skill 卡片后，在这里查看介绍和关键入口。</div>
        </aside>
      </section>
    </main>

    <script>
      const state = {
        projectIndex: null,
        skills: [],
        selectedSkill: null,
        search: "",
        activeType: "全部",
        activePlatform: "全部"
      };

      const elements = {
        metrics: document.getElementById("metrics"),
        cards: document.getElementById("cards"),
        detailPanel: document.getElementById("detailPanel"),
        typeFilters: document.getElementById("typeFilters"),
        platformFilters: document.getElementById("platformFilters"),
        searchInput: document.getElementById("searchInput")
      };

      function metricCard(label, value) {
        return `
          <article class="metric-card">
            <div class="metric-label">${label}</div>
            <div class="metric-value">${value}</div>
          </article>
        `;
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      async function fetchJson(path) {
        const response = await fetch(path);
        if (!response.ok) {
          throw new Error(`读取失败: ${path}`);
        }
        return response.json();
      }

      async function loadData() {
        const projectIndex = await fetchJson("../registry/project-index.json");
        const skillsRegistry = await fetchJson("../registry/skills-index.json");

        const skills = await Promise.all(
          skillsRegistry.skills.map(async (item) => {
            const skillJsonPath = `../${item.package_root}/skill.json`;
            let detail = null;

            try {
              detail = await fetchJson(skillJsonPath);
            } catch (error) {
              detail = {
                name: item.name,
                display_name: item.display_name,
                description: "未能读取完整 skill 元数据",
                supported_platforms: item.supported_platforms || [],
                category_path: item.category_path || [],
                type: item.type || "unknown"
              };
            }

            return {
              ...item,
              detail,
              skillJsonPath
            };
          })
        );

        state.projectIndex = projectIndex;
        state.skills = skills;
        state.selectedSkill = skills[0] || null;
        render();
      }

      function getFilteredSkills() {
        return state.skills.filter((skill) => {
          const query = state.search.trim().toLowerCase();
          const haystack = [
            skill.name,
            skill.display_name,
            ...(skill.category_path || []),
            ...(skill.detail?.supported_platforms || []),
            ...(skill.detail?.constraints || []),
            ...(skill.search_keywords || []),
            skill.detail?.description || ""
          ]
            .join(" ")
            .toLowerCase();

          const matchesSearch = !query || haystack.includes(query);
          const matchesType = state.activeType === "全部" || (skill.detail?.type || skill.type) === state.activeType;
          const matchesPlatform =
            state.activePlatform === "全部" ||
            (skill.detail?.supported_platforms || []).includes(state.activePlatform);

          return matchesSearch && matchesType && matchesPlatform;
        });
      }

      function renderMetrics() {
        const skills = state.skills;
        const domains = new Set(skills.flatMap((item) => item.category_path || []).filter(Boolean));
        const platforms = new Set(skills.flatMap((item) => item.detail?.supported_platforms || []));

        elements.metrics.innerHTML = [
          metricCard("Skill 总数", skills.length),
          metricCard("业务域标签", domains.size),
          metricCard("平台覆盖", platforms.size),
          metricCard("可单独分发", skills.filter((item) => item.detail?.portable !== false).length)
        ].join("");
      }

      function renderFilterChips() {
        const types = ["全部", ...new Set(state.skills.map((item) => item.detail?.type || item.type).filter(Boolean))];
        const platforms = ["全部", ...new Set(state.skills.flatMap((item) => item.detail?.supported_platforms || []))];

        elements.typeFilters.innerHTML = types
          .map(
            (type) =>
              `<button class="chip ${state.activeType === type ? "active" : ""}" data-filter-type="${escapeHtml(type)}">${escapeHtml(type)}</button>`
          )
          .join("");

        elements.platformFilters.innerHTML = platforms
          .map(
            (platform) =>
              `<button class="chip ${state.activePlatform === platform ? "active" : ""}" data-filter-platform="${escapeHtml(platform)}">${escapeHtml(platform)}</button>`
          )
          .join("");

        document.querySelectorAll("[data-filter-type]").forEach((button) => {
          button.addEventListener("click", () => {
            state.activeType = button.dataset.filterType;
            render();
          });
        });

        document.querySelectorAll("[data-filter-platform]").forEach((button) => {
          button.addEventListener("click", () => {
            state.activePlatform = button.dataset.filterPlatform;
            render();
          });
        });
      }

      function renderCards() {
        const filtered = getFilteredSkills();

        if (!filtered.length) {
          elements.cards.innerHTML = `<div class="empty">没有匹配到结果，试试换个关键词或取消平台筛选。</div>`;
          return;
        }

        elements.cards.innerHTML = filtered
          .map((skill) => {
            const detail = skill.detail || {};
            const active = state.selectedSkill?.name === skill.name;
            const platforms = (detail.supported_platforms || []).slice(0, 4);

            return `
              <article class="card ${active ? "active" : ""}" data-skill-name="${escapeHtml(skill.name)}">
                <div class="card-top">
                  <span class="tag accent">${escapeHtml(detail.type || skill.type || "skill")}</span>
                  <span class="tag">${detail.portable === false ? "非便携" : "可分发"}</span>
                </div>
                <h2 class="card-title">${escapeHtml(skill.display_name || skill.name)}</h2>
                <div class="meta-row">
                  <span class="tag mono">${escapeHtml(skill.name)}</span>
                  <span class="tag">${escapeHtml((skill.category_path || []).join(" / ") || "未分类")}</span>
                </div>
                <p class="description">${escapeHtml(detail.description || "暂无描述")}</p>
                <div class="tag-row">
                  ${platforms.map((platform) => `<span class="tag">${escapeHtml(platform)}</span>`).join("")}
                </div>
              </article>
            `;
          })
          .join("");

        document.querySelectorAll("[data-skill-name]").forEach((card) => {
          card.addEventListener("click", () => {
            const skill = state.skills.find((item) => item.name === card.dataset.skillName);
            state.selectedSkill = skill || null;
            renderCards();
            renderDetail();
          });
        });
      }

      function buildDocLink(skill, relativePath) {
        return `../${skill.package_root}/${relativePath}`;
      }

      function renderDetail() {
        const skill = state.selectedSkill;
        if (!skill) {
          elements.detailPanel.innerHTML = `<div class="empty">当前没有可展示的 skill。</div>`;
          return;
        }

        const detail = skill.detail || {};
        const implementation = detail.implementation || {};
        const requiredInputs = detail.inputs?.required || [];
        const optionalInputs = detail.inputs?.optional || [];
        const outputs = detail.outputs || [];
        const constraints = detail.constraints || [];

        const links = [
          ["SKILL.md", buildDocLink(skill, detail.entrypoint || "SKILL.md")],
          ["README.md", buildDocLink(skill, implementation.readme || "README.md")],
          ["skill.json", buildDocLink(skill, "skill.json")],
          ["INVOCATION.md", implementation.invocation_doc ? buildDocLink(skill, implementation.invocation_doc) : null]
        ].filter((item) => item[1]);

        elements.detailPanel.innerHTML = `
          <div class="eyebrow">Skill Detail</div>
          <h2 class="detail-title">${escapeHtml(skill.display_name || skill.name)}</h2>
          <div class="meta-row">
            <span class="tag mono">${escapeHtml(skill.name)}</span>
            <span class="tag">${escapeHtml(detail.type || skill.type || "skill")}</span>
            <span class="tag">${detail.portable === false ? "非便携" : "整包可分发"}</span>
          </div>
          <p class="detail-sub">${escapeHtml(detail.description || "暂无描述")}</p>

          <div class="section">
            <h3>业务路径</h3>
            <div class="tag-row">
              ${(skill.category_path || []).map((item) => `<span class="tag">${escapeHtml(item)}</span>`).join("")}
            </div>
          </div>

          <div class="section">
            <h3>平台支持</h3>
            <div class="tag-row">
              ${(detail.supported_platforms || []).map((item) => `<span class="tag accent">${escapeHtml(item)}</span>`).join("")}
            </div>
          </div>

          <div class="section">
            <h3>关键入口</h3>
            <div class="detail-actions">
              ${links
                .map(
                  ([label, href]) =>
                    `<a class="detail-link" href="${escapeHtml(href)}" target="_blank" rel="noreferrer">${escapeHtml(label)}</a>`
                )
                .join("")}
            </div>
            <p class="footer-note">包路径：<span class="mono">${escapeHtml(skill.package_root)}</span></p>
          </div>

          <div class="section">
            <h3>输入 / 输出</h3>
            <div class="detail-grid">
              ${requiredInputs.map((item) => `<span class="tag accent">必填：${escapeHtml(item)}</span>`).join("")}
              ${optionalInputs.map((item) => `<span class="tag">可选：${escapeHtml(item)}</span>`).join("")}
              ${outputs.map((item) => `<span class="tag">${escapeHtml(item)}</span>`).join("")}
            </div>
          </div>

          <div class="section">
            <h3>规则约束</h3>
            ${
              constraints.length
                ? `<ul class="list">${constraints.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>`
                : `<div class="hint">暂无规则约束</div>`
            }
          </div>

          <p class="footer-note">
            如果页面直接通过 <span class="mono">file://</span> 打开导致读取失败，请在项目根目录启动本地服务，例如
            <span class="mono">python3 -m http.server 4173</span>。
          </p>
        `;
      }

      function render() {
        renderMetrics();
        renderFilterChips();
        renderCards();
        renderDetail();
      }

      elements.searchInput.addEventListener("input", (event) => {
        state.search = event.target.value;
        renderCards();
      });

      loadData().catch((error) => {
        elements.cards.innerHTML = `
          <div class="error">
            页面未能读取项目索引：${escapeHtml(error.message)}<br />
            请在项目根目录通过本地 HTTP 服务打开这个页面，例如：<span class="mono">python3 -m http.server 4173</span>
          </div>
        `;
        elements.detailPanel.innerHTML = `
          <div class="empty">
            当前无法加载 skill 详情。通常是因为浏览器直接用 <span class="mono">file://</span> 打开页面，导致无法读取 JSON 文件。
          </div>
        `;
      });
    </script>
  </body>
</html>
